{% load static %}
{% load crispy_forms_tags %}

<!DOCTYPE html>
<html lang="es">
<head>
  <title>Iniciar sesión</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

    <video autoplay muted loop id="video-fondo">
        <source src="{% static 'images/Luciernagas.mp4' %}" type="video/mp4">
        <source src="{% static 'images/Luciernagas.webm' %}" type="video/webm">
        <!-- Texto alternativo si el video no carga -->
        Tu navegador no soporta videos HTML5.
    </video>

  <div class="container">
    <div class="row mt-5">
      <div class="col-12 col-md-6 offset-md-3">

        <!-- Tabs -->
        <ul class="nav nav-tabs" id="authTab">
          <li class="nav-item">
            <a class="nav-link {% if active_tab == 'signup' %}active{% endif %}"
               data-bs-toggle="tab" href="#signup">Registro</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if active_tab == 'login' %}active{% endif %}"
               data-bs-toggle="tab" href="#login">Iniciar sesión</a>
          </li>
        </ul>

        <div class="tab-content card card-body">

          <!-- Signup -->
          <div class="tab-pane {% if active_tab == 'signup' %}active{% endif %}" id="signup">
            <h4 class="mb-3">Crear cuenta</h4>
            <form method="post">
              {% csrf_token %}
              {{ signup_form|crispy }}
              <button type="submit" name="signup_submit" class="btn btn-success w-100">
                Registrarse
              </button>
            </form>
          </div>

          <!-- Login -->
          <div class="tab-pane {% if active_tab == 'login' %}active{% endif %}" id="login">
            <h4 class="mb-3">Bienvenido de nuevo</h4>
            <form method="post">
              {% csrf_token %}
              {{ login_form|crispy }}
              <button type="submit" name="login_submit" class="btn btn-primary w-100">
                Ingresar
              </button>
            </form>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
